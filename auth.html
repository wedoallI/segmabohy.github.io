<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Account</title>
  <link rel="stylesheet" href="new.css">
</head>

<body>

<header>
  <h2><a class="yex">Yex</a>'s Games</h2>
</header>

<main>
  <h1>Account</h1>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>

  <p id="status"></p>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvBXdP5IfVTY1QDyALVTFH0WZgRtmiVDA",
  authDomain: "gamehack-ee705.firebaseapp.com",
  projectId: "gamehack-ee705",
  storageBucket: "gamehack-ee705.firebasestorage.app",
  messagingSenderId: "335014591760",
  appId: "1:335014591760:web:cc169b187ea59767f77995",
  measurementId: "G-EJGL05JHNP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const status = document.getElementById("status");

window.signup = async () => {
  await createUserWithEmailAndPassword(auth, email.value, password.value);
  status.textContent = "Signed up!";
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
  status.textContent = "Logged in!";
};

window.logout = async () => {
  await signOut(auth);
  status.textContent = "Logged out!";
};
</script>

</body>
</html>
