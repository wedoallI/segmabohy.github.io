<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <link rel="stylesheet" href="new.css">
  <link rel="stylesheet" href="chat.css">
</head>

<body>

<header>
  <h2><a class="yex">Yex</a>'s Chat</h2>
</header>

<main>
  <div class="chat-container">
    <h1>💬 Chat</h1>

    <div id="messages"></div>

    <div class="chat-input">
      <input id="msg" placeholder="Type a message...">
      <button onclick="send()">Send</button>
    </div>

    <p id="status"></p>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvBXdP5IfVTY1QDyALVTFH0WZgRtmiVDA",
  authDomain: "gamehack-ee705.firebaseapp.com",
  projectId: "gamehack-ee705",
  storageBucket: "gamehack-ee705.firebasestorage.app",
  messagingSenderId: "335014591760",
  appId: "1:335014591760:web:cc169b187ea59767f77995",
  measurementId: "G-EJGL05JHNP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const messagesDiv = document.getElementById("messages");
const status = document.getElementById("status");

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    status.textContent = "Logged in as " + user.email;
  } else {
    status.textContent = "Login to chat";
  }
});

const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  messagesDiv.innerHTML = "";
  snapshot.forEach(doc => {
    const data = doc.data();
    messagesDiv.innerHTML += `
      <div class="msg">
        <b>${data.user}</b><br>
        ${data.text}
      </div>
    `;
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

window.send = async () => {
  if (!currentUser) return alert("Login first");

  const input = document.getElementById("msg");
  const text = input.value;

  if (!text.trim()) return;

  await addDoc(collection(db, "messages"), {
    text: text,
    user: currentUser.email,
    time: Date.now()
  });

  input.value = "";
};
</script>

</body>
</html>
