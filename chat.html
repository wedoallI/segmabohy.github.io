<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>

  <link rel="stylesheet" href="new.css">
  <link rel="stylesheet" href="snackbar.css">

  <style>
    .chat-box {
      width: 80%;
      max-width: 900px;
      margin: 2rem auto;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 1rem;
    }

    #messages {
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
    }

    .msg {
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      position: relative;
    }

    .msg b {
      color: var(--theme-clr);
    }

    .delete-btn {
      position: absolute;
      right: 10px;
      top: 10px;
      background: red;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      display: none;
    }

    .chat-input {
      display: flex;
      margin-top: 10px;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    .chat-input button {
      background: var(--theme-clr);
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h2 id="header"><a class="yex">Yex</a>'s Chat</h2>
  <nav>
    <a href="index.html"><i class="fas fa-home"></i></a>
    <a href="games.html"><i class="fas fa-gamepad"></i></a>
    <a class="active"><i class="fas fa-comments"></i></a>
  </nav>
</header>

<main>
  <div class="chat-box">
    <h1>💬 Chat</h1>

    <div id="messages"></div>

    <div class="chat-input">
      <input id="msg" placeholder="Type a message...">
      <button onclick="send()">Send</button>
    </div>

    <p id="status"></p>
  </div>
</main>
<style>.chat-box {
  width: 85%;
  max-width: 900px;
  margin: 2rem auto;
  background: rgba(0,0,0,0.45);
  border-radius: 14px;
  padding: 1rem;
  backdrop-filter: blur(10px);
}

#messages {
  height: 420px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 10px;
}

/* Message bubble */
.msg {
  display: flex;
  flex-direction: column;
  margin: 10px 0;
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  position: relative;
}

/* Your messages */
.msg.me {
  margin-left: auto;
  background: var(--theme-clr);
  color: white;
}

/* Username */
.msg b {
  font-size: 0.8rem;
  opacity: 0.7;
  margin-bottom: 3px;
}

/* Delete button */
.delete-btn {
  position: absolute;
  top: 5px;
  right: 8px;
  background: rgba(255,0,0,0.7);
  border: none;
  color: white;
  font-size: 0.7rem;
  border-radius: 5px;
  cursor: pointer;
}

/* Input area */
.chat-input {
  display: flex;
  margin-top: 10px;
  gap: 10px;
}

.chat-input input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(0,0,0,0.4);
  color: white;
}

.chat-input input::placeholder {
  color: rgba(255,255,255,0.5);
}

.chat-input button {
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  background: var(--theme-clr);
  color: white;
  cursor: pointer;
  font-weight: bold;
}</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvBXdP5IfVTY1QDyALVTFH0WZgRtmiVDA",
  authDomain: "gamehack-ee705.firebaseapp.com",
  projectId: "gamehack-ee705",
};

const ADMIN_EMAIL = "your@email.com"; // 👈 CHANGE THIS

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  document.getElementById("status").textContent =
    user ? "Logged in as " + user.email : "Login required";
});

const messagesDiv = document.getElementById("messages");

const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  messagesDiv.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <b>${data.user}</b><br>
      ${data.text}
    `;

    // ADMIN DELETE BUTTON
    if (currentUser && currentUser.email === ADMIN_EMAIL) {
      const btn = document.createElement("button");
      btn.textContent = "X";
      btn.className = "delete-btn";
      btn.style.display = "block";

      btn.onclick = async () => {
        await deleteDoc(doc(db, "messages", docSnap.id));
      };

      div.appendChild(btn);
    }

    messagesDiv.appendChild(div);
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

window.send = async () => {
  if (!currentUser) return alert("Login first");

  const input = document.getElementById("msg");
  if (!input.value.trim()) return;

  await addDoc(collection(db, "messages"), {
    text: input.value,
    user: currentUser.email,
    time: Date.now()
  });

  input.value = "";
};
</script>

</body>
</html>
